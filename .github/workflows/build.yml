name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Visual C++ Redistributable
      run: |
        choco install vcredist140 -y
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.4.2 PyQt6-Qt6==6.4.2 PyQt6-sip==13.6.0 --force-reinstall
        pip install scipy==1.12.0
        pip install sounddevice==0.4.6
        pip install soundfile==0.12.1
        pip install librosa==0.10.1
        pip install numpy==1.26.4
        pip install pyinstaller==6.3.0
    
    - name: Build EXE
      run: |
        pyinstaller build_windows.spec --clean --noconfirm
    
    - name: Check EXE dependencies
      run: |
        cd dist\QingqiuAvatar
        dir
        dir _internal\PyQt6\Qt6\bin\ 2>nul || echo "Qt6 DLL check skipped"
    
    - name: Package artifact
      run: |
        cd dist
        dir
        7z a -tzip "../Qingqiu-Avatar-Windows.zip" "QingqiuAvatar"
        cd ..
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Qingqiu-Avatar-Windows
        path: Qingqiu-Avatar-Windows.zip
    
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: Qingqiu-Avatar-Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
